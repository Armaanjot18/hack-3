<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediCheck Login</title>
  <style>
    :root {
      --bg-deep: #060B18;
      --bg-card: #0D1526;
      --border: #1A2F4A;
      --accent-cyan: #00E5FF;
      --accent-purple: #7B61FF;
      --text-primary: #EDF2FF;
      --text-muted: #607B96;
      --red: #FF4C4C;
      --green: #00E676;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 229, 255, 0.12), transparent 45%),
        radial-gradient(circle at 80% 70%, rgba(123, 97, 255, 0.12), transparent 45%),
        var(--bg-deep);
      color: var(--text-primary);
      padding: 20px;
    }
    .card {
      width: min(460px, 100%);
      padding: 28px;
      border-radius: 20px;
      background: rgba(13, 21, 38, 0.75);
      border: 1px solid rgba(0, 229, 255, 0.2);
      backdrop-filter: blur(12px);
      box-shadow: 0 0 30px rgba(0, 229, 255, 0.14);
    }
    h1 {
      font-size: 34px;
      line-height: 1.1;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00E5FF, #7B61FF);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { color: var(--text-muted); margin-bottom: 18px; }
    label {
      display: block;
      font-size: 12px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: #9fb8d3;
      margin: 8px 0 6px;
    }
    input {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #0b1830;
      color: var(--text-primary);
      outline: none;
    }
    input:focus {
      border-color: var(--accent-cyan);
      box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.15);
    }
    button {
      margin-top: 14px;
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 12px;
      font-weight: 700;
      background: var(--accent-cyan);
      color: #051021;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    button:hover { transform: translateY(-1px); box-shadow: 0 0 28px rgba(0, 229, 255, 0.4); }
    .error {
      margin-top: 12px;
      color: var(--red);
      font-size: 14px;
      min-height: 20px;
    }
    .ok {
      color: var(--green);
      font-size: 14px;
      min-height: 20px;
    }
    .row {
      margin-top: 14px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .row a { color: var(--accent-cyan); }
  </style>
</head>
<body>
  <main class="card" aria-labelledby="title">
    <h1 id="title">Welcome Back</h1>
    <p>Login to access all MediCheck features.</p>

    <form id="loginForm" novalidate>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" minlength="8" required />

      <button type="submit">Login</button>
      <div id="message" class="error" aria-live="polite"></div>
    </form>

    <div class="row">New user? <a href="/signup">Create an account</a></div>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');

    function validEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      message.className = 'error';
      message.textContent = '';

      const email = form.email.value.trim().toLowerCase();
      const password = form.password.value;

      if (!validEmail(email)) {
        message.textContent = 'Please enter a valid email address.';
        return;
      }
      if (password.length < 8) {
        message.textContent = 'Password must be at least 8 characters.';
        return;
      }

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();
        if (!res.ok) {
          message.textContent = data.error || 'Login failed.';
          return;
        }

        message.className = 'ok';
        message.textContent = 'Login successful. Redirecting...';
        window.location.href = '/';
      } catch (_) {
        message.textContent = 'Network error. Please try again.';
      }
    });
  </script>
</body>
</html>
